<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>お問い合わせ｜住宅購入予算 簡易シミュレータ</title>
<meta name="description" content="住宅購入予算 簡易シミュレータへのお問い合わせページです。" />
<style>
  :root{
    --bg:#E9ECEA; --card:#FCFCFB; --ink:#1F2D3A; --ink-soft:#62707C; --line:#D7DCDF;
    --in:#2C6E8F; --goal:#B5793A;
    --sans:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans);
       line-height:1.9; -webkit-font-smoothing:antialiased; padding:30px 18px 70px}

  .sitenav{max-width:640px; margin:0 auto 20px; display:flex; flex-wrap:wrap; gap:6px 18px;
           align-items:center; font-size:.84rem}
  .sitenav .brand{font-weight:800; color:var(--ink); text-decoration:none; margin-right:auto}
  .sitenav a{color:var(--ink-soft); text-decoration:none}
  .sitenav a:hover{color:var(--in)}
  @media(max-width:600px){.sitenav{font-size:.8rem; gap:4px 14px}}

  .wrap{max-width:640px; margin:0 auto}
  .card{background:var(--card); border:1px solid var(--line); border-radius:15px; padding:28px 26px}
  h1{font-size:1.34rem; letter-spacing:-.01em; margin:0 0 8px}
  .intro{font-size:.9rem; color:var(--ink-soft); margin:0 0 22px}
  label{display:block; font-size:.86rem; font-weight:600; margin:16px 0 6px}
  input, textarea{width:100%; padding:11px 12px; font-size:16px; border:1px solid var(--line);
                  border-radius:9px; color:var(--ink); background:#fff; font-family:inherit}
  input:focus, textarea:focus{outline:2px solid var(--in); outline-offset:1px; border-color:transparent}
  textarea{min-height:140px; resize:vertical; line-height:1.7}
  button{margin-top:20px; background:var(--in); color:#fff; font-weight:700; font-size:.95rem;
         border:none; border-radius:10px; padding:12px 24px; cursor:pointer}
  button:hover{filter:brightness(1.06)}
  .privacy-note{margin-top:16px; font-size:.76rem; color:var(--ink-soft)}
  .privacy-note a{color:var(--in)}
  @media(max-width:600px){.card{padding:22px 18px} h1{font-size:1.2rem}}

  .sitefoot{max-width:640px; margin:34px auto 0; padding-top:18px; border-top:1px solid var(--line);
            display:flex; flex-wrap:wrap; gap:6px 18px; font-size:.78rem; color:var(--ink-soft)}
  .sitefoot a{color:var(--ink-soft); text-decoration:none}
  .sitefoot a:hover{color:var(--in)}
  .sitefoot .copy{margin-right:auto}
</style>
</head>
<body>
<nav class="sitenav">
  <a href="index.html" class="brand">住宅購入予算シミュレータ</a>
  <a href="index.html">ホーム</a>
  <a href="profile.html">運営者情報</a>
  <a href="privacy.html">プライバシーポリシー</a>
  <a href="contact.html">お問い合わせ</a>
</nav>

<div class="wrap">
  <div class="card">
    <h1>お問い合わせ</h1>
    <p class="intro">当サイトに関するご意見・ご質問は、以下のフォームよりお送りください。いただいた内容には、必要に応じて運営者よりご返信いたします。</p>

    <!--
      ▼▼ 設定メモ（このコメントは画面には表示されません） ▼▼
      Formspree に登録後、発行される送信先URL（https://formspree.io/f/xxxxxxxx）を
      下の <form action="..."> の "FORMSPREE_ENDPOINT" の部分に貼り替えてください。
      それまではフォームは送信できません。
      ▲▲▲▲
    -->
    <form action="https://formspree.io/f/xlgyvypr" method="POST">
      <label for="name">お名前（ニックネーム可）</label>
      <input type="text" id="name" name="name" required>

      <label for="email">メールアドレス</label>
      <input type="email" id="email" name="email" required>

      <label for="message">お問い合わせ内容</label>
      <textarea id="message" name="message" required></textarea>

      <button type="submit">送信する</button>

      <p class="privacy-note">
        ご入力いただいた情報は、お問い合わせへの対応のみに使用します。
        詳しくは<a href="privacy.html">プライバシーポリシー</a>をご確認ください。
      </p>
    </form>
  </div>
</div>

<footer class="sitefoot">
  <span class="copy">© 2026 hackeyoi</span>
  <a href="index.html">ホーム</a>
  <a href="profile.html">運営者情報</a>
  <a href="privacy.html">プライバシーポリシー</a>
</footer>
</body>
</html>
